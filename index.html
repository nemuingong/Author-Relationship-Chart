<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>棒バト作者作風相関図</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        /* 全体：標準的なゴシック体に変更し、実用的なツール感を引き出す */
        body { margin: 0; padding: 0; font-family: "Meiryo", "Hiragino Kaku Gothic Pro", sans-serif; overflow: hidden; background-color: #f0f0f0; }
        #network-container { width: 100vw; height: 100vh; }
        
        /* パネル枠：角丸とふわっとした影を廃止し、硬派な枠線と影に変更 */
        .controls-wrapper { position: absolute; top: 15px; left: 15px; z-index: 100; width: 100%; max-width: 320px; }
        .controls-wrapper > summary { 
            cursor: pointer; padding: 8px 12px; margin: 0; 
            background: #e0e0e0; border: 1px solid #666; 
            color: #111; font-weight: bold; font-size: 14px;
            list-style: none; display: flex; align-items: center; justify-content: space-between; 
        }
        .controls-wrapper > summary:hover { background: #d0d0d0; }
        .controls-wrapper > summary::-webkit-details-marker { display: none; }
        .controls-wrapper > summary::after { content: '▼'; font-size: 10px; color: #333; }
        .controls-wrapper:not([open]) > summary::after { content: '▶'; }
        
        .controls {
            background: #fff; padding: 15px; 
            border: 1px solid #666; border-top: none;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.1);
        }
        
        /* 見出し：シンプルに下線のみ */
        h3 { margin: 0 0 15px 0; font-size: 16px; color: #111; border-bottom: 2px solid #333; padding-bottom: 5px; }
        
        /* 折りたたみパネル：Wikiや個人サイトによくある硬めのスタイル */
        .details-panel { margin-bottom: 15px; border: 1px solid #bbb; background: #fff; }
        .details-panel > summary { cursor: pointer; font-weight: bold; font-size: 13px; color: #111; padding: 8px 10px; list-style: none; display: flex; justify-content: space-between; align-items: center; background: #eee; }
        .details-panel > summary:hover { background: #e5e5e5; }
        .details-panel > summary::-webkit-details-marker { display: none; }
        .details-panel > summary::after { content: '▼'; font-size: 10px; color: #666; }
        .details-panel:not([open]) > summary::after { content: '▶'; }
        .details-panel[open] > summary { border-bottom: 1px solid #bbb; }
        .details-content { padding: 12px; }
        
        /* 検索周り：角丸をやめ、ブラウザ標準に近い無骨な見た目へ */
        .search-container { display: flex; gap: 5px; }
        .search-input { flex-grow: 1; padding: 6px; border: 1px solid #999; font-size: 13px; outline: none; }
        .search-input:focus { border-color: #111; background: #ffffe0; }
        .search-btn { padding: 6px 12px; background: #333; color: white; border: 1px solid #111; cursor: pointer; font-size: 13px; }
        .search-btn:hover { background: #555; }

        /* 概要ボタン：太文字や左枠線を使って選択状態を表現 */
        .legend-title { font-size: 13px; font-weight: bold; margin-bottom: 8px; color: #111; border-left: 3px solid #666; padding-left: 6px; }
        .legend-button { display: flex; align-items: center; width: 100%; padding: 6px 8px; margin-bottom: 4px; border: 1px solid #ddd; background: #f9f9f9; cursor: pointer; text-align: left; font-size: 12px; color: #333; }
        .legend-button:hover { background: #eaeaea; border-color: #bbb; }
        .legend-button.active { background: #fff; border-color: #333; font-weight: bold; border-left: 4px solid #333; color: #000; }
        .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 10px; border: 1px solid #666; }
        
        /* 作者一覧リスト */
        .author-list-box { margin-top: 15px; padding: 10px; border: 1px solid #bbb; background: #fdfdfd; max-height: 200px; overflow-y: scroll; }
        .author-list-title { font-size: 12px; font-weight: bold; color: #111; margin-bottom: 6px; border-bottom: 1px dotted #999; padding-bottom: 3px; }
        .author-list-content { font-size: 12px; color: #333; line-height: 1.5; }
        .author-list-content div { padding: 2px 0; border-bottom: 1px solid #eee; }
        .author-list-content div:last-child { border-bottom: none; }
        
        /* ガイドテキスト */
        .info-text { font-size: 11px; color: #444; line-height: 1.5; margin-top: 15px; padding: 10px; background: #fdfdfd; border: 1px dashed #aaa; }
        .info-text strong { color: #111; display: block; margin-bottom: 4px; font-size: 12px; }
        .info-text ul { margin: 8px 0 0 0; padding-left: 15px; }
        .info-text li { margin-bottom: 3px; }

        #status { font-weight: bold; font-size: 12px; color: #0056b3; margin-top: 15px; padding-top: 10px; border-top: 1px solid #eee; }
        .error { color: #cc0000; }
        .text-muted { color: #888; font-size: 11px; }
    </style>
</head>
<body>

<details class="controls-wrapper" open>
    <summary>操作パネル</summary>
    <div class="controls-inner">
        <div class="controls">
            <h3>棒バト作者作風相関図</h3>

            <details class="details-panel" open>
                <summary>検索</summary>
                <div class="details-content">
                    <div class="search-container">
                        <input type="text" id="search-input" class="search-input" list="author-list" placeholder="作者名を入力..." onkeydown="if(event.key==='Enter') searchAuthor()">
                        <datalist id="author-list"></datalist>
                        <button class="search-btn" onclick="searchAuthor()">検索</button>
                    </div>
                </div>
            </details>

            <details class="details-panel" open>
                <summary>概要</summary>
                <div class="details-content">
                    <div id="legend-area">
                        <div class="legend-title">影響を与えた人数</div>
                        <button class="legend-button" onclick="showAuthorsForDegree(0)" data-degree="0"><span class="dot" style="background:#e9ecef"></span><span>0人</span></button>
                        <button class="legend-button" onclick="showAuthorsForDegree(1)" data-degree="1"><span class="dot" style="background:#e3f2fd"></span><span>1人</span></button>
                        <button class="legend-button" onclick="showAuthorsForDegree(2)" data-degree="2"><span class="dot" style="background:#90caf9"></span><span>2人</span></button>
                        <button class="legend-button" onclick="showAuthorsForDegree(3)" data-degree="3"><span class="dot" style="background:#ffcc80"></span><span>3人</span></button>
                        <button class="legend-button" onclick="showAuthorsForDegree(4)" data-degree="4"><span class="dot" style="background:#ffb74d"></span><span>4人</span></button>
                        <button class="legend-button" onclick="showAuthorsForDegree(5)" data-degree="5"><span class="dot" style="background:#ff8a65"></span><span>5人</span></button>
                        <button class="legend-button" onclick="showAuthorsForDegree(6)" data-degree="6"><span class="dot" style="background:#e57373"></span><span>6人以上</span></button>
                    </div>

                    <div class="author-list-box">
                        <div class="author-list-title">作者一覧</div>
                        <div id="degree-authors-list" class="author-list-content">※人数を選択してください</div>
                    </div>
                </div>
            </details>
            
            <div class="info-text">
                <strong>[影響を受けた作者] → [影響元]</strong>
                矢印は「誰を参考にしているか」を示します。
                <ul>
                    <li><span style="color:#0056b3;">クリック / 検索</span> : 繋がりをハイライト</li>
                    <li><span style="color:#cc0000;">ダブルクリック</span> : 作者詳細リンクを表示</li>
                </ul>
            </div>

            <div id="status">準備完了</div>
        </div>
    </div>
</details>

<div id="network-container"></div>

<script type="text/javascript">
    const ENDPOINT_URL = "https://aiueo9999.pythonanywhere.com/sparql";
    let network = null;
    let nodesSet = null;
    let edgesSet = null;
    let degreeGroups = null;

    window.onload = function() { loadData(); };

    function getColorByDegree(degree) {
        if (degree === 0) return { background: "#e9ecef", border: "#aaa" }; 
        const palette = [
            { background: "#e3f2fd", border: "#90caf9" }, { background: "#90caf9", border: "#42a5f5" }, 
            { background: "#ffcc80", border: "#ffa726" }, { background: "#ffb74d", border: "#fb8c00" }, 
            { background: "#ff8a65", border: "#f4511e" }, { background: "#e57373", border: "#cc0000" }  
        ];
        return palette[Math.min(degree - 1, palette.length - 1)];
    }

    async function loadData() {
        const status = document.getElementById('status');
        status.innerHTML = "データを取得中...";

        const queryRefs = `
            PREFIX ex: <http://example.org/bat/>
            SELECT DISTINCT ?source ?target WHERE {
                ?author_uri ex:reference ?raw_target .
                BIND(REPLACE(STR(?author_uri), "^.*Author_", "") AS ?source)
                OPTIONAL { 
                    ?target_uri ex:alias ?raw_target .
                    BIND(REPLACE(STR(?target_uri), "^.*Author_", "") AS ?main_target)
                }
                BIND(COALESCE(?main_target, ?raw_target) AS ?target)
            }
        `;

        try {
            const resRefs = await fetch(ENDPOINT_URL + "?query=" + encodeURIComponent(queryRefs), { headers: { 'Accept': 'application/json' } });
            if (!resRefs.ok) throw new Error("データの取得に失敗");
            const jsonRefs = await resRefs.json();
            
            const rawData = jsonRefs.results.bindings.map(b => {
                let sName = b.source.value;
                let tName = b.target.value;
                try { sName = decodeURIComponent(sName); } catch(e) {}
                try { tName = decodeURIComponent(tName); } catch(e) {}
                return [sName.replace(/_/g, ' '), tName.replace(/_/g, ' ')];
            });

            const nodeNames = new Set();
            rawData.forEach(d => { nodeNames.add(d[0]); nodeNames.add(d[1]); });

            const inDegree = {};
            nodeNames.forEach(n => inDegree[n] = 0);
            rawData.forEach(d => { inDegree[d[1]] += 1; });

            degreeGroups = { 0: [], 1: [], 2: [], 3: [], 4: [], 5: [], 6: [] };
            const nodesData = Array.from(nodeNames).map(name => {
                const degree = inDegree[name];
                const key = degree >= 6 ? 6 : degree;
                degreeGroups[key].push(name);
                return { 
                    id: name, label: name, 
                    color: { background: getColorByDegree(degree).background, border: getColorByDegree(degree).border },
                    font: { color: "#111" }, value: 20,
                    title: `影響を与えた人数: ${degree}人`
                };
            });

            Object.keys(degreeGroups).forEach(key => {
                degreeGroups[key].sort((a, b) => a.localeCompare(b, 'ja'));
            });
            showAuthorsForDegree(0);

            const edgesData = [];
            const exists = new Set();
            rawData.forEach(d => {
                const edgeId = d[0] + "->" + d[1];
                if (!exists.has(edgeId)) {
                    edgesData.push({ id: edgeId, from: d[0], to: d[1], arrows: { to: { enabled: true, scaleFactor: 1, type: 'arrow' } }, color: { color: '#999', opacity: 0.7, highlight: '#666', hover: '#666' } });
                    exists.add(edgeId);
                }
            });

            const datalist = document.getElementById('author-list');
            Array.from(nodeNames).sort().forEach(name => {
                const option = document.createElement('option');
                option.value = name;
                datalist.appendChild(option);
            });

            status.innerHTML = `描画完了`;
            drawGraph(nodesData, edgesData);

        } catch (e) {
            status.innerHTML = `<span class="error">エラー発生: ${e.message}</span>`;
        }
    }

    function drawGraph(nodesData, edgesData) {
        const container = document.getElementById('network-container');
        nodesSet = new vis.DataSet(nodesData);
        edgesSet = new vis.DataSet(edgesData);
        
        const options = {
            nodes: { shape: 'dot', font: { size: 14, strokeWidth: 0, face: 'Arial, sans-serif' }, scaling: { min: 20, max: 20 }, borderWidth: 2, shadow: { enabled: true, color: 'rgba(0,0,0,0.2)', size: 3, x: 2, y: 2 } },
            edges: { width: 1.5, smooth: { type: 'dynamic' }, hoverWidth: 1.5 },
            physics: { forceAtlas2Based: { gravitationalConstant: -60, springLength: 150, springConstant: 0.08 }, solver: 'forceAtlas2Based', stabilization: { iterations: 150 } },
            interaction: { hover: true, tooltipDelay: 100 }
        };

        network = new vis.Network(container, { nodes: nodesSet, edges: edgesSet }, options);
        network.on("selectNode", function (params) { highlightConnections(params.nodes[0]); });
        network.on("deselectNode", resetHighlight);
        
        network.on("doubleClick", function (params) { 
            if (params.nodes.length > 0) {
                openSoukanPage(params.nodes[0]); 
            }
        });
    }

    function openSoukanPage(nodeIdOrName) {
        if (!nodeIdOrName) return;
        let key = nodeIdOrName;
        try {
            if (!/^Author_/.test(key)) {
                key = key.replace(/ /g, '_');
            }
        } catch(e) {}
        const url = 'https://aiueo9999.pythonanywhere.com/soukan/' + encodeURIComponent(key);
        window.open(url, '_blank');
    }

    function highlightConnections(nodeId) {
        const connectedNodes = network.getConnectedNodes(nodeId);
        const connectedEdges = network.getConnectedEdges(nodeId);
        let updateNodes = []; nodesSet.forEach(node => { updateNodes.push({ id: node.id, opacity: (node.id === nodeId || connectedNodes.includes(node.id)) ? 1 : 0.15 }); });
        nodesSet.update(updateNodes);
        let updateEdges = []; edgesSet.forEach(edge => {
            const isConnected = connectedEdges.includes(edge.id);
            const isOutgoing = edge.from === nodeId;
            const edgeColor = isConnected ? (isOutgoing ? '#cc0000' : '#0056b3') : '#999';
            updateEdges.push({
                id: edge.id,
                width: isConnected ? 2.5 : 1.0,
                color: { color: edgeColor, opacity: isConnected ? 1 : 0.1, highlight: edgeColor, hover: edgeColor },
                arrows: { to: { enabled: true, scaleFactor: 1, type: 'arrow', color: edgeColor } }
            });
        });
        edgesSet.update(updateEdges);
    }

    function resetHighlight() {
        if(!network) return;
        let updateNodes = []; nodesSet.forEach(node => { updateNodes.push({ id: node.id, opacity: 1 }); }); nodesSet.update(updateNodes);
        let updateEdges = []; edgesSet.forEach(edge => { updateEdges.push({ id: edge.id, width: 1.5, color: { color: '#999', opacity: 0.7, highlight: '#666', hover: '#666' }, arrows: { to: { enabled: true, scaleFactor: 1, type: 'arrow', color: '#999' } } }); }); edgesSet.update(updateEdges);
    }

    function showAuthorsForDegree(degree) {
        const buttons = document.querySelectorAll('.legend-button');
        buttons.forEach(btn => btn.classList.toggle('active', Number(btn.dataset.degree || 0) === degree));

        const listBox = document.getElementById('degree-authors-list');
        if (!degreeGroups) {
            listBox.innerHTML = '<span class="text-muted">（データ読み込み中）</span>';
            return;
        }

        const key = degree >= 6 ? 6 : degree;
        const authors = degreeGroups[key] || [];
        if (!authors.length) {
            listBox.innerHTML = '<span class="text-muted">（該当なし）</span>';
            return;
        }

        listBox.innerHTML = authors.map(name => `<div>${name}</div>`).join('');
    }

    function searchAuthor() {
        const input = document.getElementById('search-input').value.trim();
        if (!input) return;
        if (nodesSet.get(input)) {
            network.selectNodes([input]);
            network.focus(input, { scale: 1.2, animation: { duration: 500, easingFunction: "easeInOutQuad" } });
            highlightConnections(input);
        } else {
            alert(`「${input}」はグラフ内に見つかりませんでした。`);
        }
    }
</script>
</body>
</html>
